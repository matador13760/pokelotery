<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeRaffle — Loterie de cartes Pokémon rares</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: rgba(15,15,15,0.82);
      --bg2: rgba(30,30,30,0.85);
      --text: #f0f0ec;
      --text2: #a0a09c;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.22);
      --radius: 8px;
      --radius-lg: 12px;
      --gold: #FAC775;
      --gold-bg: rgba(250,206,110,0.15);
      --green: #5DCAA5;
      --green-bg: rgba(93,202,165,0.12);
      --red: #F09595;
      --red-bg: rgba(240,149,149,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
      background: #0a0a0a url('bg.jpg') center center / cover fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.62);
      z-index: 0;
      pointer-events: none;
    }

    header, main, footer { position: relative; z-index: 1; }

    .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

    header {
      background: rgba(10,10,10,0.75);
      border-bottom: 0.5px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; gap: 12px; flex-wrap: wrap; }
    .logo { font-size: 20px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.3px; flex-shrink: 0; }
    .logo span { color: var(--gold); }

    /* SEARCH BAR */
    .search-wrap {
      flex: 1;
      max-width: 320px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      opacity: 0.4;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      font-size: 13px;
      font-family: inherit;
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      color: var(--text);
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); }
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: none;
      padding: 0;
    }
    .search-clear.visible { display: block; }

    .nav-tabs { display: flex; gap: 4px; flex-shrink: 0; }
    .tab {
      padding: 7px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer;
      border: none; background: transparent; color: var(--text2); font-family: inherit; transition: background .15s, color .15s;
    }
    .tab:hover { background: var(--bg2); color: var(--text); }
    .tab.active { background: var(--bg2); color: var(--text); font-weight: 500; }

    main { padding: 28px 0 60px; }
    .section { display: none; }
    .section.active { display: block; }

    /* SEARCH RESULTS BANNER */
    .search-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: rgba(250,199,117,0.1);
      border: 0.5px solid rgba(250,199,117,0.3);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .search-banner.visible { display: flex; }
    .search-banner span { color: var(--gold); }
    .search-banner button {
      background: none; border: none; color: var(--text2); cursor: pointer;
      font-size: 12px; font-family: inherit; text-decoration: underline;
    }

    .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; backdrop-filter: blur(8px); }
    .stat .s-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .stat .s-val { font-size: 24px; font-weight: 500; }

    .rarity-filter { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .pill {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; border: 0.5px solid var(--border2);
      cursor: pointer; background: rgba(0,0,0,0.4); color: var(--text2); font-family: inherit; transition: all .15s; backdrop-filter: blur(6px);
    }
    .pill:hover { border-color: var(--text); color: var(--text); }
    .pill.active { background: var(--text); color: #0a0a0a; border-color: var(--text); }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }

    .lot-card {
      background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; transition: border-color .15s, transform .15s; backdrop-filter: blur(10px);
    }
    .lot-card:hover { border-color: var(--border2); transform: translateY(-3px); }
    .lot-card.holo { border-color: rgba(250,199,117,0.5); }
    .lot-card.highlight { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(250,199,117,0.3); }

    .card-banner { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 58px; position: relative; overflow: hidden; }
    .card-banner img { width: 100%; height: 100%; object-fit: cover; }
    .card-banner .emoji-fallback { font-size: 58px; }
    .rarity-badge { position: absolute; top: 8px; right: 8px; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
    .rb-secret { background: #EEEDFE; color: #3C3489; }
    .rb-ultra  { background: #FAEEDA; color: #633806; }
    .rb-holo   { background: #E6F1FB; color: #0C447C; }
    .rb-ex     { background: #FAECE7; color: #712B13; }

    .card-body { padding: 14px; }
    .card-body h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; color: var(--text); }
    .card-body .set { font-size: 11px; color: var(--text2); margin-bottom: 10px; }
    .raw-price { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .raw-price strong { color: var(--text); }
    .prog-wrap { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 8px 0 4px; }
    .prog-bar  { height: 5px; border-radius: 3px; transition: width .4s; }
    .slots-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 12px; }
    .t-price { font-size: 18px; font-weight: 600; color: var(--text); }
    .t-price span { font-size: 12px; font-weight: 400; color: var(--text2); }
    .t-val { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .btn-ticket {
      width: 100%; margin-top: 12px; padding: 10px; font-size: 13px; font-weight: 600;
      border-radius: var(--radius); border: none; cursor: pointer; background: var(--gold);
      color: #1a1000; font-family: inherit; transition: opacity .15s;
    }
    .btn-ticket:hover { opacity: .85; }
    .full-badge { text-align: center; font-size: 12px; padding: 9px; background: rgba(255,255,255,0.06); border-radius: var(--radius); color: var(--text2); margin-top: 12px; }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 48px; color: var(--text2); font-size: 14px; }
    .empty-state .em-icon { font-size: 32px; margin-bottom: 10px; }
    .empty-state p { margin-bottom: 6px; }
    .empty-state small { font-size: 12px; color: var(--text3); }

    /* COLLECTION HEADER */
    .collection-header {
      display: flex; align-items: center; gap: 10px;
      margin: 24px 0 12px; padding-bottom: 8px;
      border-bottom: 0.5px solid var(--border);
    }
    .collection-header h2 { font-size: 15px; font-weight: 600; }
    .collection-count { font-size: 11px; color: var(--text2); background: rgba(255,255,255,0.07); padding: 2px 8px; border-radius: 10px; }

    /* ADMIN */
    .admin-wrap { max-width: 560px; }
    .admin-wrap h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
    .panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; backdrop-filter: blur(10px); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: rgba(255,255,255,0.06); color: var(--text); outline: none; transition: border-color .15s;
    }
    .field input:focus, .field select:focus { border-color: var(--gold); }
    .field select option { background: #1a1a1a; color: var(--text); }
    .field input[type="range"] { padding: 0; border: none; background: transparent; cursor: pointer; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .preview-box { background: rgba(255,255,255,0.05); border-radius: var(--radius); padding: 14px; margin: 14px 0; font-size: 13px; }
    .preview-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
    .preview-row:last-child { border: none; font-weight: 600; }
    .preview-row .label { color: var(--text2); }
    .good { color: var(--green); }
    .bad  { color: var(--red); }
    .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 12px; margin-bottom: 12px; }
    .alert.good { background: var(--green-bg); color: var(--green); }
    .alert.warn { background: var(--gold-bg); color: var(--gold); }
    .alert.bad  { background: var(--red-bg); color: var(--red); }
    .btn-publish {
      width: 100%; padding: 12px; font-size: 14px; font-weight: 600; border-radius: var(--radius);
      border: none; cursor: pointer; background: var(--gold); color: #1a1000; font-family: inherit; transition: opacity .15s;
    }
    .btn-publish:hover { opacity: .85; }

    footer { text-align: center; padding: 24px 0; font-size: 12px; color: var(--text3); border-top: 0.5px solid var(--border); }

    @media (max-width: 600px) {
      .search-wrap { max-width: 100%; order: 3; flex-basis: 100%; }
      .grid2 { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <nav class="nav">
      <a class="logo" href="#">Poke<span>Raffle</span></a>

      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" type="text" id="search-input" placeholder="Rechercher une carte..." oninput="handleSearch(this.value)">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>

      <div class="nav-tabs">
        <button class="tab active" onclick="showTab('vitrine', this)">Vitrine</button>
        <button class="tab" onclick="showTab('admin', this)">+ Ajouter</button>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="container">

    <div id="vitrine" class="section active">
      <div class="stats-bar" id="stats-bar"></div>

      <div class="search-banner" id="search-banner">
        <span id="search-result-text"></span>
        <button onclick="clearSearch()">Effacer la recherche</button>
      </div>

      <div class="rarity-filter" id="rarity-filter">
        <button class="pill active" onclick="filterCards('all', this)">Toutes</button>
        <button class="pill" onclick="filterCards('secret', this)">Secret Rare</button>
        <button class="pill" onclick="filterCards('ultra', this)">Ultra Rare</button>
        <button class="pill" onclick="filterCards('holo', this)">Holo Rare</button>
        <button class="pill" onclick="filterCards('ex', this)">EX / GX / V</button>
      </div>

      <div id="cards-container"></div>
    </div>

    <div id="admin" class="section">
      <div class="admin-wrap">
        <div class="panel">
          <h2>Ajouter une carte en loterie</h2>
          <div class="grid2">
            <div class="field"><label>Nom de la carte</label><input type="text" id="a-name" placeholder="ex: Dracaufeu VMAX" oninput="previewCalc()"></div>
            <div class="field"><label>Collection</label><input type="text" id="a-collection" placeholder="ex: Épée & Bouclier" oninput="previewCalc()"></div>
          </div>
          <div class="grid2">
            <div class="field"><label>Rareté</label>
              <select id="a-rarity" onchange="previewCalc()">
                <option value="secret">Secret Rare</option>
                <option value="ultra">Ultra Rare</option>
                <option value="holo">Holo Rare</option>
                <option value="ex">EX / GX / V</option>
              </select>
            </div>
            <div class="field"><label>Emoji (si pas d'image)</label><input type="text" id="a-emoji" placeholder="🔥" value="✨" oninput="previewCalc()"></div>
          </div>
          <div class="field"><label>URL de l'image (optionnel)</label><input type="text" id="a-img" placeholder="https://..." oninput="previewCalc()"></div>
          <div class="grid2">
            <div class="field"><label>Prix RAW (€)</label><input type="number" id="a-raw" value="150" min="50" step="5" oninput="previewCalc()"></div>
            <div class="field"><label>Frais d'envoi (€)</label><input type="number" id="a-ship" value="8" min="0" step="1" oninput="previewCalc()"></div>
          </div>
          <div class="field">
            <label>Marge souhaitée (%)</label>
            <input type="range" id="a-margin" min="10" max="60" value="30" step="5" oninput="previewCalc(); document.getElementById('margin-out').textContent = this.value + '%'">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px;">
              <span>10%</span><span id="margin-out" style="font-weight:600;color:var(--text);">30%</span><span>60%</span>
            </div>
          </div>
          <div id="alert-box"></div>
          <div class="preview-box" id="preview-box"></div>
          <button class="btn-publish" onclick="addCard()">Publier la loterie</button>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="container">PokeRaffle &mdash; Loteries de cartes Pokémon rares &mdash; Expédition soignée garantie</div>
</footer>

<script>
  const COMMISSION = 0.029;
  const RARITY_LABEL = { secret:'Secret Rare', ultra:'Ultra Rare', holo:'Holo Rare', ex:'EX / GX / V' };
  const RARITY_CLASS = { secret:'rb-secret', ultra:'rb-ultra', holo:'rb-holo', ex:'rb-ex' };
  const RARITY_COLOR = { secret:'rgba(250,236,231,0.2)', ultra:'rgba(250,238,218,0.2)', holo:'rgba(230,241,251,0.2)', ex:'rgba(225,245,238,0.2)' };
  const RARITY_HOLO  = ['secret','ultra'];

  let cards = [
    {id:1, name:'Dracaufeu VMAX', collection:'Épée & Bouclier — Darkness Ablaze', emoji:'🔥', img:'', rarity:'secret', raw:220, ship:8,  slots:35, ticket:9,  filled:27},
    {id:2, name:'Mewtwo EX',      collection:'XY — Évolutions',                   emoji:'🔮', img:'', rarity:'ultra',  raw:150, ship:6,  slots:28, ticket:7,  filled:14},
    {id:3, name:'Pikachu Illustrateur', collection:'Promo — 1997',               emoji:'⚡', img:'', rarity:'secret', raw:500, ship:10, slots:45, ticket:14, filled:18},
    {id:4, name:'Lugia V Alt Art', collection:'Silver Tempest',                   emoji:'🌊', img:'', rarity:'ultra',  raw:180, ship:8,  slots:30, ticket:8,  filled:30},
    {id:5, name:'Umbreon VMAX',    collection:'Évolutions Brillantes',             emoji:'🌙', img:'', rarity:'ultra',  raw:130, ship:6,  slots:25, ticket:7,  filled:11},
    {id:6, name:'Rayquaza VMAX',   collection:'Legendary Clash',                   emoji:'🐉', img:'', rarity:'ex',     raw:95,  ship:6,  slots:22, ticket:6,  filled:4 },
  ];

  let nextId = 7;
  let activeFilter = 'all';
  let searchQuery = '';

  function calcTickets(raw, ship, marginPct) {
    const cost = raw + ship, target = cost / (1 - marginPct/100), revenue = target / (1 - COMMISSION);
    const ticket = Math.ceil(Math.max(3, revenue / Math.round(revenue/6)) * 2) / 2;
    const slots = Math.ceil(revenue / ticket), gross = +(ticket*slots).toFixed(2);
    const net = +(gross*(1-COMMISSION)).toFixed(2), profit = +(net-cost).toFixed(2);
    return {ticket, slots, gross, net, profit, margin: Math.round((profit/gross)*100)};
  }

  function getFilteredCards() {
    let list = activeFilter === 'all' ? cards : cards.filter(c => c.rarity === activeFilter);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      list = list.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.collection.toLowerCase().includes(q) ||
        RARITY_LABEL[c.rarity].toLowerCase().includes(q)
      );
    }
    return list;
  }

  function groupByCollection(list) {
    const groups = {};
    list.forEach(c => {
      if (!groups[c.collection]) groups[c.collection] = [];
      groups[c.collection].push(c);
    });
    return groups;
  }

  function cardHTML(c, highlight) {
    const pct = Math.round((c.filled/c.slots)*100), remaining = c.slots-c.filled, full = remaining<=0;
    const barColor = full ? '#F09595' : remaining<=5 ? '#FAC775' : '#5DCAA5';
    const clientVal = Math.round(((c.raw/c.slots)/c.ticket)*100);
    const holoClass = RARITY_HOLO.includes(c.rarity) ? ' holo' : '';
    const highlightClass = highlight ? ' highlight' : '';
    const banner = c.img
      ? `<img src="${c.img}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const emojiFallback = `<span class="emoji-fallback" style="${c.img ? 'display:none' : ''}">${c.emoji}</span>`;
    return `<div class="lot-card${holoClass}${highlightClass}">
      <div class="card-banner" style="${!c.img ? 'background:'+RARITY_COLOR[c.rarity]+';' : ''}">
        ${banner}${emojiFallback}
        <span class="rarity-badge ${RARITY_CLASS[c.rarity]}">${RARITY_LABEL[c.rarity]}</span>
      </div>
      <div class="card-body">
        <h3>${c.name}</h3>
        <div class="set">${c.collection}</div>
        <div class="raw-price">Valeur RAW : <strong>${c.raw} €</strong></div>
        <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%;background:${barColor};"></div></div>
        <div class="slots-info">
          <span>${c.filled}/${c.slots} tickets vendus</span>
          <span>${full?'Complet':remaining<=5?remaining+' restants':pct+'%'}</span>
        </div>
        <div class="t-price">${c.ticket} € <span>/ ticket</span></div>
        <div class="t-val">Valeur perçue : ~${clientVal}% du prix RAW</div>
        ${full
          ? `<div class="full-badge">Tirage en cours...</div>`
          : `<button class="btn-ticket" onclick="buyTicket(${c.id})">Prendre un ticket</button>`}
      </div>
    </div>`;
  }

  function renderCards() {
    const container = document.getElementById('cards-container');
    const list = getFilteredCards();
    const isSearching = searchQuery.trim().length > 0;

    const banner = document.getElementById('search-banner');
    const resultText = document.getElementById('search-result-text');
    const filterEl = document.getElementById('rarity-filter');

    if (isSearching) {
      banner.classList.add('visible');
      resultText.textContent = list.length > 0
        ? `${list.length} résultat${list.length > 1 ? 's' : ''} pour "${searchQuery}"`
        : `Aucun résultat pour "${searchQuery}"`;
      filterEl.style.opacity = '0.4';
      filterEl.style.pointerEvents = 'none';
    } else {
      banner.classList.remove('visible');
      filterEl.style.opacity = '';
      filterEl.style.pointerEvents = '';
    }

    if (!list.length) {
      container.innerHTML = `<div class="cards-grid"><div class="empty-state">
        <div class="em-icon">🔍</div>
        <p>Aucune carte trouvée</p>
        <small>Essaie un autre mot-clé ou efface la recherche</small>
      </div></div>`;
      renderStats(); return;
    }

    if (isSearching) {
      container.innerHTML = `<div class="cards-grid">${list.map(c => cardHTML(c, true)).join('')}</div>`;
    } else {
      const groups = groupByCollection(list);
      container.innerHTML = Object.entries(groups).map(([col, items]) => `
        <div class="collection-header">
          <h2>${col}</h2>
          <span class="collection-count">${items.length} carte${items.length > 1 ? 's' : ''}</span>
        </div>
        <div class="cards-grid">${items.map(c => cardHTML(c, false)).join('')}</div>
      `).join('');
    }

    renderStats();
  }

  function renderStats() {
    const active = cards.filter(c => c.filled < c.slots).length;
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat"><div class="s-label">Loteries actives</div><div class="s-val">${active}</div></div>
      <div class="stat"><div class="s-label">Cartes en vitrine</div><div class="s-val">${cards.length}</div></div>`;
  }

  function handleSearch(val) {
    searchQuery = val;
    document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
    renderCards();
  }

  function clearSearch() {
    searchQuery = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    renderCards();
  }

  function buyTicket(id) {
    const c = cards.find(x => x.id === id);
    if (!c || c.filled >= c.slots) return;
    c.filled++; renderCards();
  }

  function filterCards(rarity, btn) {
    activeFilter = rarity;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  function showTab(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active'); btn.classList.add('active');
    if (id === 'admin') previewCalc();
  }

  function previewCalc() {
    const raw=parseFloat(document.getElementById('a-raw').value)||100;
    const ship=parseFloat(document.getElementById('a-ship').value)||8;
    const margin=parseInt(document.getElementById('a-margin').value)||30;
    const r=calcTickets(raw,ship,margin), fees=+(r.gross-r.net).toFixed(2);
    const cls=margin>=25?'good':margin>=15?'warn':'bad';
    const msg=margin>=25?`Bonne marge — tu récupères ~${r.profit.toFixed(0)} € net.`:margin>=15?`Marge correcte mais serrée.`:`Marge trop faible.`;
    document.getElementById('alert-box').innerHTML=`<div class="alert ${cls}">${msg}</div>`;
    document.getElementById('preview-box').innerHTML=`
      <div class="preview-row"><span class="label">Prix du ticket</span><span>${r.ticket} €</span></div>
      <div class="preview-row"><span class="label">Nombre de tickets</span><span>${r.slots}</span></div>
      <div class="preview-row"><span class="label">Revenus bruts</span><span>${r.gross.toFixed(2)} €</span></div>
      <div class="preview-row"><span class="label">Commission (2.9%)</span><span class="bad">− ${fees.toFixed(2)} €</span></div>
      <div class="preview-row"><span class="label">Carte + envoi</span><span class="bad">− ${(raw+ship).toFixed(2)} €</span></div>
      <div class="preview-row"><span class="label">Bénéfice net</span><span class="${r.profit>=0?'good':'bad'}">${r.profit>=0?'+':''}${r.profit.toFixed(2)} €</span></div>`;
  }

  function addCard() {
    const name=document.getElementById('a-name').value.trim();
    if(!name){alert('Donne un nom à la carte.');return;}
    const collection=document.getElementById('a-collection').value.trim()||'Sans collection';
    const raw=parseFloat(document.getElementById('a-raw').value)||100;
    const ship=parseFloat(document.getElementById('a-ship').value)||8;
    const margin=parseInt(document.getElementById('a-margin').value)||30;
    const rarity=document.getElementById('a-rarity').value;
    const emoji=document.getElementById('a-emoji').value||'✨';
    const img=document.getElementById('a-img').value.trim()||'';
    const r=calcTickets(raw,ship,margin);
    cards.unshift({id:nextId++,name,collection,emoji,img,rarity,raw,ship,slots:r.slots,ticket:r.ticket,filled:0});
    document.getElementById('a-name').value='';
    document.getElementById('a-collection').value='';
    document.getElementById('a-img').value='';
    activeFilter='all';
    document.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('active',i===0));
    showTab('vitrine',document.querySelectorAll('.tab')[0]);
    renderCards();
  }

  renderCards();
  previewCalc();
</script>
</body>
</html>
